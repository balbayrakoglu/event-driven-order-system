input {
  tcp {
    port => 5000
      codec => json_lines
}
}

filter {
# Ensure timestamp is parsed
if [@timestamp] {
date {
match => ["@timestamp", "ISO8601"]
}
}

# Ensure service exists
if ![service] {
mutate {
add_field => { "service" => "unknown-service" }
    }
  }

  # Normalize log level
  mutate {
    lowercase => ["level"]
  }

  # Keep original + copy
  mutate {
    copy => { "message" => "log_message" }
  }

  # Drop only specific noisy logs
  if [message] =~ /GET \/actuator\/health/ {
    drop { }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{service}-%{+YYYY.MM.dd}"
ilm_enabled => false
manage_template => false
retry_on_conflict => 3
}

stdout {
codec => rubydebug
}
}